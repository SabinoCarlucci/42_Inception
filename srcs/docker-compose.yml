version: "3.8"

services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    env_file:
      - .env
    volumes:
      - /home/scarlucc/data/mariadb:/var/lib/mysql
    networks:
      - inception_network
    restart: always

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    env_file:
      - .env
    volumes:
      - /home/scarlucc/data/wordpress:/var/www/html
    networks:
      - inception_network
    depends_on:
      - mariadb
    restart: always

  nginx:
    build: ./requirements/nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - /home/scarlucc/data/wordpress:/var/www/html
    networks:
      - inception_network
    depends_on:
      - wordpress
    restart: always

networks:
  inception_network:
    driver: bridge